# Template configuration for one Ultrack experiment.

name: provided_reference_labels

input:
  input_dir: ../Tribolium_Daten/cellpose_label_images
  file_pattern: "*_cp_masks.png"
  n_frames: null

  crop:
    enabled: false
    y_start: null
    y_end: null
    x_start: null
    x_end: null

output:
  output_dir: ../Tribolium_Daten/runs/provided_reference_labels
  overwrite: true

pipeline:
  # Active pipeline mode for this run.
  mode: existing_labels
  
existing_labels:
  labels_to_contours_sigma: 1.0

normalization:
  enabled: true
  percentile_low: 1
  percentile_high: 99
  gamma: 1.0

raw_sobel:
  gaussian_sigma: 1.0
  threshold: 0.05
  min_size: 500
  hole_area_threshold: 10000

ultrack_imgproc:
  # These fields are placeholders for the official Ultrack preprocessing functions.
  # They are not active for this existing_labels run.
  use_detect_foreground: false
  use_robust_invert: false

cellpose:
  enabled: false
  model: provided_reference_model
  model_path: ../Tribolium_Daten/Cellpose_model_Tribolium_Final_251119
  diameter: 57.5
  flow_threshold: 0.3
  cellprob_threshold: -0.5
  use_gpu: false
  save_png: false
  save_npy: false
  use_existing_masks: true
  masks_dir: ../Tribolium_Daten/cellpose_label_images

preprocessing:
  border:
    enabled: false
    top: 0
    bottom: 0
    left: 0
    right: 0

ultrack:
  min_area: 500
  max_area: 10000
  max_distance: 30
  max_neighbors: 5
  min_frontier: null

export:
  save_raw_norm: true
  save_foreground: true
  save_contours: true
  save_tracks_csv: true
  save_analysis_plots: true
  save_run_info: true
  save_config_used: true
  save_log: true

analysis:
  early_frame_start: 0
  early_frame_end: 50
  middle_frame_start: 250
  middle_frame_end: 300
  late_frame_start: 520
  late_frame_end: 570

  short_track_thresholds: [5, 10]
  long_track_thresholds: [100, 300, 500]

  border_analysis:
    enabled: true
    top: 50
    bottom: 50
    left: 50
    right: 100

notes:
  description: "Full-frame label-based Ultrack run using provided/reference Cellpose label masks as segmentation input."

  documentation: |
    This configuration was used for a full-frame label-based Ultrack run over all available frames.
    The input label masks were read from the cellpose_label_images directory. In these masks, the
    background is represented by label 0 and each segmented object is represented by a positive
    integer label.

    The pipeline mode was existing_labels. The input labels were converted into foreground and
    contour/boundary information for Ultrack using labels_to_contours_sigma = 1.0. No raw-image-based
    segmentation candidates were generated in this run.

    Cellpose was not executed inside this run because cellpose.enabled is set to false. The Cellpose
    block remains in the YAML file as a shared configuration section. No crop and no border mask were
    applied. The run used min_area = 500, max_area = 10000, max_distance = 30, and max_neighbors = 5.

    A later area analysis on 20 provided/reference label masks measured 18548 labeled cells. The
    measured areas had a 5th percentile of 1012 pixels, a median of 1664 pixels, a 95th percentile
    of 2683 pixels, and a maximum of 5354 pixels.
